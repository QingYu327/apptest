            <script>
            (function() {
                'use strict';

                // ===== 1. 代码块复制按钮 =====
                // 遍历文章内容中的所有代码块，为每个 pre 添加复制按钮
                document.querySelectorAll('.post-content pre').forEach(function(pre) {
                    // 避免重复添加
                    if (pre.querySelector('.code-copy-btn')) return;
                    var btn = document.createElement('button');
                    btn.className = 'code-copy-btn';
                    btn.type = 'button';
                    btn.textContent = '复制';
                    btn.setAttribute('aria-label', '复制代码');
                    pre.appendChild(btn);
                    btn.addEventListener('click', function() {
                        var code = pre.querySelector('code');
                        var text = code ? code.innerText : pre.innerText;
                        // 优先使用 Clipboard API，失败时降级到 execCommand
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(text).then(function() {
                                showCopied(btn);
                            }).catch(function() {
                                fallbackCopy(text, btn);
                            });
                        } else {
                            fallbackCopy(text, btn);
                        }
                    });
                });

                // 显示"已复制"提示，2 秒后恢复
                function showCopied(btn) {
                    btn.textContent = '已复制';
                    btn.classList.add('copied');
                    setTimeout(function() {
                        btn.textContent = '复制';
                        btn.classList.remove('copied');
                    }, 2000);
                }

                // 降级复制方案（兼容不支持 Clipboard API 的环境）
                function fallbackCopy(text, btn) {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    try {
                        document.execCommand('copy');
                        showCopied(btn);
                    } catch (e) {}
                    document.body.removeChild(ta);
                }

                // ===== 2. 回到顶部按钮 + 阅读进度条（合并 scroll 监听 + rAF 节流）=====
                // 用 requestAnimationFrame 节流：每帧最多更新一次，避免快速滑动时 scroll 事件触发过频造成卡顿
                // 只在状态变化时修改 DOM，避免不必要重排
                var backTopBtn = document.getElementById('back-to-top');
                var progressBar = document.getElementById('reading-progress');
                // 标记：custom.js 检测到该标记后跳过重复绑定，避免双进度条抖动
                if (backTopBtn) backTopBtn.dataset.grideaInline = '1';
                if (progressBar) progressBar.dataset.grideaInline = '1';
                var backTopVisible = false;
                var ticking = false;

                // 缓存滚动尺寸：scrollHeight/clientHeight 读取会强制布局刷新，是滑动卡顿的元凶
                // 只在 resize 时重新计算，不在每次滚动帧都读
                var cachedScrollHeight = document.documentElement.scrollHeight;
                var cachedClientHeight = document.documentElement.clientHeight;
                var lastPercent = -1;

                function recalcScrollMetrics() {
                    cachedScrollHeight = document.documentElement.scrollHeight;
                    cachedClientHeight = document.documentElement.clientHeight;
                    lastPercent = -1; // 强制下次滚动时刷新进度条
                }

                function onScrollUpdate() {
                    var scrollTop = window.scrollY || document.documentElement.scrollTop;

                    // 回到顶部按钮：只在显隐状态变化时改 class
                    if (backTopBtn) {
                        var shouldShow = scrollTop > 300;
                        if (shouldShow !== backTopVisible) {
                            backTopVisible = shouldShow;
                            if (shouldShow) {
                                backTopBtn.classList.add('visible');
                            } else {
                                backTopBtn.classList.remove('visible');
                            }
                        }
                    }

                    // 阅读进度条：用 transform: scaleX() 触发 GPU 合成层，避免 width 触发重排
                    // 只在百分比变化 >= 0.5% 时才更新 transform，避免每帧都写 style 造成样式重算
                    if (progressBar) {
                        var scrollRange = cachedScrollHeight - cachedClientHeight;
                        var percent = scrollRange > 0 ? (scrollTop / scrollRange) : 0;
                        // 量化到 0.5% 步进，减少 DOM 写入次数
                        var quantized = Math.round(percent * 200) / 200;
                        if (quantized !== lastPercent) {
                            lastPercent = quantized;
                            progressBar.style.transform = 'scaleX(' + quantized + ')';
                        }
                    }

                    ticking = false;
                }

                window.addEventListener('scroll', function() {
                    if (!ticking) {
                        window.requestAnimationFrame(onScrollUpdate);
                        ticking = true;
                    }
                }, { passive: true });
                // resize 时重新计算尺寸（用户旋转屏幕或字体缩放后）
                var resizeTimer = null;
                window.addEventListener('resize', function() {
                    if (resizeTimer) clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(function() {
                        recalcScrollMetrics();
                        if (!ticking) {
                            window.requestAnimationFrame(onScrollUpdate);
                            ticking = true;
                        }
                    }, 200);
                }, { passive: true });
                onScrollUpdate();

                if (backTopBtn) {
                    backTopBtn.addEventListener('click', function() {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                }

                // ===== 4. 图片点击放大 =====
                // 点击文章内图片全屏放大，再次点击关闭
                // 阻止默认行为和冒泡，避免图片在 <a> 标签内时触发链接跳转
                var overlay = document.getElementById('image-zoom-overlay');
                var zoomImg = document.getElementById('image-zoom-img');
                // 标记：custom.js 检测到该标记后跳过重复绑定
                if (overlay) overlay.dataset.grideaInline = '1';
                if (overlay && zoomImg) {
                    document.querySelectorAll('.post-content img, .post-feature img').forEach(function(img) {
                        img.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            zoomImg.src = img.src;
                            zoomImg.alt = img.alt || '';
                            overlay.classList.add('visible');
                            overlay.setAttribute('aria-hidden', 'false');
                            document.body.style.overflow = 'hidden';
                        });
                    });
                    function closeZoom() {
                        overlay.classList.remove('visible');
                        overlay.setAttribute('aria-hidden', 'true');
                        zoomImg.src = '';
                        document.body.style.overflow = '';
                    }
                    overlay.addEventListener('click', closeZoom);
                    document.addEventListener('keydown', function(e) {
                        if (e.key === 'Escape') closeZoom();
                    });
                }
            })();
            </script>
